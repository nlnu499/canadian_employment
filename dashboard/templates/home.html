
<!DOCTYPE html>
<html>
<head>
    <title>Canadian Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            color: #2c3e50;
        }

        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .message {
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #2c3e50;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

<div class="container">

    <h1> Canadian Employment Dashboard</h1>

    <p>Upload your CSV file below:</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <br><br>
        <button type="submit">Upload</button>
    </form>

    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}

 
</div>

</body>
